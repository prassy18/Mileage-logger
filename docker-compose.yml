version: "3.8"

services:
  trip-logger:
    build: .
    container_name: trip-logger
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PIN=${PIN}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
